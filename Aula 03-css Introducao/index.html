<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Introdução</title>

    <!-- External CSS,link externo -->
    <!-- rel = relação /  stylesheet =  folha de estilo -->
    <link rel="stylesheet" href="css/style.css">


    <!-- Internal quando o css esta no mesmo arquivo -->
    <style>
        p {
            color: purple;
            font-size: 40px;
        }
    </style>
</head>

<body>
    <!-- Inline quando o css vai para a linha HTML -->
    <p style="color: green;">Este é um páragrafo verde</p>
    <p style="color: green;">Este é outro páragrafo verde</p>

    <h1 style="color: blue; font-size: 50px;">Mudar cor do titulo Inline</h1>

    <!-- Internal CSS -->
    <P>Este é um páragrafo com estilo Internal</P>

    <!-- External css -->
    <h3>Titulo do External </h3>

    <!-- Classe -->
    <p class="Paragrafo">Este é um parágrafo com classes</p>
    <p class="Paragrafo"> Este é um novo paragrafo com classes</p>
    <p class="Paragrafo">Este é o ultimo paragrafo com classes</p>

    <!-- Id -->
    <h2 id="Titulo-com-id">Titulo com id</h2>

    <!--Regra de ordem -->
    <h3 id="id-titulo" class="class-titulo">Titulo 1</h3>
    <h3 class="class-titulo">Titulo 2</h3>
    <h3>Titulo 3</h3>


</body>
</html>
