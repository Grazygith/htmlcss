<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <!-- Responsividade inicial -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Display: Bloco Embutido -->
    <div class="inline-block">a</div>
    <div class="inline-block">b</div>
    <div class="inline-block">c</div>

    <!-- Posição Stick -->
    <div class="stick">
        <span>Sou um elemento Stick</span>
    </div>

    <!-- Display: Bloco de Exibição -->
    <div class="block">e</div>
    <div class="block">f</div>
    <div class="block">e</div>
    <div class="block">f</div>
    <div class="block">e</div>
    <div class="block">f</div>
    <div class="block">e</div>
    <div class="block">f</div>
    <div class="block">e</div>
    <div class="block">f</div>
    <div class="block">e</div>
    <div class="block">f</div>


    <!-- Display: Bloco de Exibição -->
    <div class="block">e</div>
    <div class="block">f</div>

    <!-- Esconedndo Elemento -->
    <p class="escondendo">Esse paragrafo deve se esconder</p>

    <!-- Posição Estatica -->
    <div class="static">
        <span>Sou um elemento Estatico</span>
    </div>


    <!-- Posição Relativa -->
    <div class="relative">
        <span>Sou um elemento Relativo</span>
    </div>
    <!-- Erro ao acrescentar um elemento após o position
         Relative, pode ser resolvido com Margin -->
    <p>Aqui vai um parágrafo de um trecho de uma pesquisa</p>


    <!-- Posição Absoluta -->
    <div class="absolute">
        <span>Sou um elemento Absoluto</span>
    </div>
    <p>Aqui vai um paragráfo de um trechi de uma opinião pessoal</p>

    <!-- Posição Relativa com Absoluta -->
    <div class="bloco-relativo">
        <div class="bloco-absoluto-1"></div>
        <div class="bloco-absoluto-2"></div>
    </div>


    <!-- Z-index -->
    <div class="bloco-relativo">
        <div class="bloco-absoluto-3"></div>
        <div class="bloco-absoluto-4"></div>
        <div class="bloco-absoluto-5"></div>
    </div>
</body>

</html>
